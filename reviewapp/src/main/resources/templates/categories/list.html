<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>カテゴリ一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>カテゴリ一覧</h1>
        <a href="/categories/new" class="btn btn-primary">新規登録</a>
    </div>

    <div class="card mb-3" th:each="category : ${categories}">
        <div class="card-body">
            <h5 class="card-title" th:text="${category.name}"></h5>
            <a class="btn btn-outline-primary btn-sm"
               th:href="@{/categories/{id}/edit(id=${category.id})}">
               編集
            </a>
            <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post">
                <button type="submit">削除</button>
            </form>

        </div>
    </div>

    <a href="/nodes" class="btn btn-secondary">ノード一覧へ戻る</a>

</div>

</body>
</html>
