<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>カテゴリ編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <form th:action="@{/categories/{id}(id=${category.id})}"
        method="post">

        <input type="text"
            name="name"
            th:value="${category.name}">

        <button type="submit">
            更新
        </button>

    </form>
</body>
</html>
