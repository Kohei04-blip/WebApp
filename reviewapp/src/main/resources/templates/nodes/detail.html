<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ノード詳細</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <h1 th:text="${node.title}"></h1>

            <p class="text-muted">
                カテゴリ：
                <span th:text="${node.category != null ? node.category.name : '未設定'}"></span>
            </p>

            <hr>

            <p th:text="${node.content}"></p>

            <a th:href="@{/nodes}"
               class="btn btn-secondary">
                一覧へ戻る
            </a>

        </div>
    </div>

</div>

</body>
</html>
